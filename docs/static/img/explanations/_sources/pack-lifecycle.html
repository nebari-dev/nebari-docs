<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pack Lifecycle Diagram — Source</title>
  <meta name="description" content="Editable source for the Pack lifecycle diagram rendered at /img/explanations/pack-lifecycle.png. Plain HTML with inline styles, openable in any browser, re-importable into Paper via the write_html MCP tool.">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; padding: 24px; background: #f5f5f5; font-family: Poppins, system-ui, sans-serif; display: flex; justify-content: center; }
    .artboard { box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  </style>
</head>
<body>
  <div class="artboard" style="background-color: #FFFFFF; box-sizing: border-box; display: flex; flex-direction: column; gap: 24px; padding: 40px 80px; width: 920px; font-family: 'Poppins', system-ui, sans-serif;">

    <!-- Pack's git repo (outside the cluster) -->
    <div style="align-items: center; background-color: #F9ECFE; border: 1.5px solid #6B21A8; border-radius: 12px; display: flex; flex-direction: column; gap: 4px; padding: 18px 32px;">
      <div style="color: #2A1F33; font-size: 24px; line-height: 30px;">Pack's git repo</div>
    </div>

    <!-- "is synced by" arrow -->
    <div style="align-items: center; display: flex; padding: 8px 0; width: 100%;">
      <div style="flex: 1;"></div>
      <svg width="20" height="32" viewBox="0 0 20 32" xmlns="http://www.w3.org/2000/svg" style="flex-shrink: 0;">
        <path d="M10 0 L10 28 M2 20 L10 28 L18 20" stroke="#2A1F33" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <div style="align-items: center; display: flex; flex: 1; padding-left: 12px;">
        <div style="color: #2A1F33; font-size: 20px; line-height: 24px;">is synced by</div>
      </div>
    </div>

    <!-- Managed Kubernetes cluster container -->
    <div style="background-color: #FFFBEB; border: 1.5px solid #92400E; border-radius: 14px; display: flex; flex-direction: column; padding: 32px 40px;">

      <div style="align-items: center; display: flex; justify-content: space-between; padding-bottom: 16px;">
        <div style="color: #2A1F33; font-size: 20px; font-weight: 700; letter-spacing: 0.08em; line-height: 24px; text-transform: uppercase;">Managed Kubernetes cluster</div>
      </div>

      <!-- ArgoCD (platform automation, peach) -->
      <div style="align-items: center; background-color: #FEF3C7; border: 1.5px solid #B45309; border-radius: 12px; display: flex; flex-direction: column; gap: 4px; padding: 18px 32px;">
        <div style="color: #2A1F33; font-size: 24px; line-height: 30px;">ArgoCD</div>
      </div>

      <!-- "deploys" arrow -->
      <div style="align-items: center; display: flex; padding: 12px 0; width: 100%;">
        <div style="flex: 1;"></div>
        <svg width="20" height="32" viewBox="0 0 20 32" xmlns="http://www.w3.org/2000/svg" style="flex-shrink: 0;">
          <path d="M10 0 L10 28 M2 20 L10 28 L18 20" stroke="#2A1F33" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <div style="align-items: center; display: flex; flex: 1; padding-left: 12px;">
          <div style="color: #2A1F33; font-size: 20px; line-height: 24px;">deploys</div>
        </div>
      </div>

      <!-- Pack workloads + NebariApp (pack-authored, lilac) -->
      <div style="align-items: center; background-color: #F9ECFE; border: 1.5px solid #6B21A8; border-radius: 12px; display: flex; flex-direction: column; gap: 4px; padding: 18px 32px;">
        <div style="color: #2A1F33; font-size: 24px; line-height: 30px;">Pack workloads + NebariApp</div>
      </div>

      <!-- "is picked up by" arrow -->
      <div style="align-items: center; display: flex; padding: 12px 0; width: 100%;">
        <div style="flex: 1;"></div>
        <svg width="20" height="32" viewBox="0 0 20 32" xmlns="http://www.w3.org/2000/svg" style="flex-shrink: 0;">
          <path d="M10 0 L10 28 M2 20 L10 28 L18 20" stroke="#2A1F33" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <div style="align-items: center; display: flex; flex: 1; padding-left: 12px;">
          <div style="color: #2A1F33; font-size: 20px; line-height: 24px;">is picked up by</div>
        </div>
      </div>

      <!-- Nebari Operator (platform automation, peach) -->
      <div style="align-items: center; background-color: #FEF3C7; border: 1.5px solid #B45309; border-radius: 12px; display: flex; flex-direction: column; gap: 4px; padding: 18px 32px;">
        <div style="color: #2A1F33; font-size: 24px; line-height: 30px;">Nebari Operator</div>
      </div>

      <!-- "creates" arrow -->
      <div style="align-items: center; display: flex; padding: 12px 0; width: 100%;">
        <div style="flex: 1;"></div>
        <svg width="20" height="32" viewBox="0 0 20 32" xmlns="http://www.w3.org/2000/svg" style="flex-shrink: 0;">
          <path d="M10 0 L10 28 M2 20 L10 28 L18 20" stroke="#2A1F33" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <div style="align-items: center; display: flex; flex: 1; padding-left: 12px;">
          <div style="color: #2A1F33; font-size: 20px; line-height: 24px;">creates</div>
        </div>
      </div>

      <!-- HTTPRoute · Certificate · Keycloak client (platform automation, peach) -->
      <div style="align-items: center; background-color: #FEF3C7; border: 1.5px solid #B45309; border-radius: 12px; display: flex; flex-direction: column; gap: 4px; padding: 18px 32px;">
        <div style="color: #2A1F33; font-size: 24px; line-height: 30px;">HTTPRoute · Certificate · Keycloak client</div>
      </div>

      <!-- "appears on" arrow -->
      <div style="align-items: center; display: flex; padding: 12px 0; width: 100%;">
        <div style="flex: 1;"></div>
        <svg width="20" height="32" viewBox="0 0 20 32" xmlns="http://www.w3.org/2000/svg" style="flex-shrink: 0;">
          <path d="M10 0 L10 28 M2 20 L10 28 L18 20" stroke="#2A1F33" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <div style="align-items: center; display: flex; flex: 1; padding-left: 12px;">
          <div style="color: #2A1F33; font-size: 20px; line-height: 24px;">appears on</div>
        </div>
      </div>

      <!-- Landing page (platform automation, peach) -->
      <div style="align-items: center; background-color: #FEF3C7; border: 1.5px solid #B45309; border-radius: 12px; display: flex; flex-direction: column; gap: 4px; padding: 18px 32px;">
        <div style="color: #2A1F33; font-size: 24px; line-height: 30px;">Landing page</div>
      </div>

    </div>

    <!-- Legend -->
    <div style="align-items: center; display: flex; gap: 32px; justify-content: center; padding-top: 8px;">
      <div style="align-items: center; display: flex; gap: 8px;">
        <div style="background-color: #F9ECFE; border: 1.5px solid #6B21A8; border-radius: 4px; flex-shrink: 0; height: 20px; width: 20px;"></div>
        <div style="color: #2A1F33; font-size: 20px; line-height: 24px;">From the pack author</div>
      </div>
      <div style="align-items: center; display: flex; gap: 8px;">
        <div style="background-color: #FEF3C7; border: 1.5px solid #B45309; border-radius: 4px; flex-shrink: 0; height: 20px; width: 20px;"></div>
        <div style="color: #2A1F33; font-size: 20px; line-height: 24px;">Platform automation</div>
      </div>
    </div>

  </div>
</body>
</html>
