name: Test Website
on:
  pull_request:
    branches: ["*"]

jobs:
  publish:
    name: Test Website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./docs
    steps:
      - name: Check out repository 🛎️
        uses: actions/checkout@v4

      - name: Set up Node 🔧
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies 📦
        run: npm ci

      - name: Lint 🔍
        run: npm run lint

      - name: Format 🥇
        run: npm run format

      - name: Build site 🔨
        run: npm run build
